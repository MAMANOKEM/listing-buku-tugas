<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BookVerse - Platform Buku Digital</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 font-sans min-h-screen flex flex-col">

    <header class="bg-indigo-600 text-white shadow-md sticky top-0 z-50">
        <div class="container mx-auto px-4 py-4 flex flex-col md:flex-row justify-between items-center gap-4">
            <h1 class="text-2xl font-bold tracking-wide flex items-center gap-2 cursor-pointer" onclick="switchPage('beranda')">
                📚 BookVerse
            </h1>
            
            <nav class="flex flex-wrap justify-center gap-2">
                <button id="nav-beranda" onclick="switchPage('beranda')" class="px-4 py-2 rounded-lg font-semibold bg-indigo-800 text-white transition">
                    Beranda
                </button>
                <button id="nav-rekomendasi" onclick="switchPage('rekomendasi')" class="px-4 py-2 rounded-lg font-semibold hover:bg-indigo-700 transition">
                    Rekomendasi
                </button>
                <button id="nav-pencarian" onclick="switchPage('pencarian')" class="px-4 py-2 rounded-lg font-semibold hover:bg-indigo-700 transition">
                    Buku Pencarian
                </button>
                <button id="nav-favorit" onclick="switchPage('favorit')" class="px-4 py-2 rounded-lg font-semibold hover:bg-indigo-700 transition flex items-center gap-1">
                    Favorit <span id="fav-count" class="bg-red-500 text-white text-xs px-2 py-0.5 rounded-full hidden">0</span>
                </button>
            </nav>
        </div>
    </header>

    <main class="container mx-auto px-4 py-8 flex-grow max-w-6xl">

        <div id="searchSection" class="max-w-xl mx-auto mb-8 flex gap-2 hidden">
            <input type="text" id="searchInput" placeholder="Cari judul buku Indonesia, penulis, atau kategori..." 
                   class="w-full px-4 py-2 border-2 border-indigo-200 rounded-lg text-gray-800 focus:outline-none focus:ring-2 focus:ring-indigo-400">
            <button id="searchBtn" class="bg-indigo-600 hover:bg-indigo-700 text-white px-6 py-2 rounded-lg font-semibold transition">
                Cari
            </button>
        </div>

        <div id="loading" class="text-center text-xl font-semibold text-indigo-600 my-10 hidden">
            Sedang memuat data buku...
        </div>

        <div id="bookContainer" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6 justify-center">
        </div>
    </main>

    <div id="bookModal" class="fixed inset-0 bg-black bg-opacity-50 z-50 flex items-center justify-center p-4 hidden opacity-0 transition-opacity duration-300">
        <div class="bg-white rounded-2xl max-w-2xl w-full max-h-[90vh] overflow-y-auto shadow-2xl transform scale-95 transition-transform duration-300 pref-modal">
            <div class="p-4 border-b flex justify-between items-center sticky top-0 bg-white z-10">
                <span id="modalCategory" class="text-xs font-bold text-indigo-600 uppercase tracking-wider">Kategori</span>
                <button onclick="closeModal()" class="text-gray-400 hover:text-gray-600 text-2xl font-bold px-2">&times;</button>
            </div>
            <div class="p-6 flex flex-col md:flex-row gap-6">
                <div class="w-full md:w-1/3 flex justify-center">
                    <img id="modalImg" src="" alt="Cover Buku" class="h-60 object-cover shadow-lg rounded-lg w-full max-w-[160px]">
                </div>
                <div class="w-full md:w-2/3 flex flex-col">
                    <h3 id="modalTitle" class="text-2xl font-bold text-gray-900 mb-1">Judul Buku</h3>
                    <p class="text-sm text-gray-600 mb-1">Penulis: <span id="modalAuthors" class="font-semibold text-gray-800">Nama</span></p>
                    <p class="text-sm text-gray-600 mb-4">Tahun Terbit: <span id="modalYear" class="font-semibold text-gray-800">Tahun</span></p>
                    <h4 class="font-bold text-gray-800 text-sm mb-1">Sinopsis / Deskripsi:</h4>
                    <p id="modalDesc" class="text-sm text-gray-600 text-justify leading-relaxed flex-grow overflow-y-auto max-h-40 pr-2">Deskripsi Lengkap...</p>
                    
                    <div class="mt-6 flex gap-3">
                        <button id="modalFavBtn" class="flex-1 py-2.5 rounded-xl font-semibold text-sm transition flex items-center justify-center gap-2">
                        </button>
                        <a id="modalLink" href="#" target="_blank" class="block text-center bg-gray-100 text-gray-700 font-medium py-2.5 px-4 rounded-xl transition text-sm">
                            Baca Detail Lengkap ↗
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <footer class="bg-gray-800 text-gray-400 text-center py-4 text-sm mt-auto">
        &copy; 2026 Maman
    </footer>

    <script>
        const bookContainer = document.getElementById('bookContainer');
        const loadingElement = document.getElementById('loading');
        const searchSection = document.getElementById('searchSection');
        const searchInput = document.getElementById('searchInput');
        const searchBtn = document.getElementById('searchBtn');
        const favCountBadge = document.getElementById('fav-count');

        const bookModal = document.getElementById('bookModal');
        const modalCategory = document.getElementById('modalCategory');
        const modalImg = document.getElementById('modalImg');
        const modalTitle = document.getElementById('modalTitle');
        const modalAuthors = document.getElementById('modalAuthors');
        const modalYear = document.getElementById('modalYear');
        const modalDesc = document.getElementById('modalDesc');
        const modalFavBtn = document.getElementById('modalFavBtn');
        const modalLink = document.getElementById('modalLink');

        let currentPage = 'beranda';
        let favoriteBooks = JSON.parse(localStorage.getItem('favBooks')) || [];
        let currentLoadedBooks = [];

        const dataBukuIndonesia = [
            { id: "id1", title: "Laskar Pelangi", authors: "Andrea Hirata", category: "Novel Indonesia", description: "Kisah inspiratif sepuluh anak dari keluarga miskin di Belitung yang berjuang menempuh pendidikan di sekolah Muhammadiyah di tengah segala keterbatasan.", thumbnail: "https://images.unsplash.com/photo-1544947950-fa07a98d237f?auto=format&fit=crop&w=400&q=80", publishedDate: "2005-01-01", infoLink: "#" },
            { id: "id2", title: "Bumi Manusia", authors: "Pramoedya Ananta Toer", category: "Sastra Sejarah", description: "Kisah roman sejarah berlatar kebangkitan nasional pada masa kolonial Belanda, mempertemukan pemikiran Minke dengan Annelies dan Nyai Ontosoroh.", thumbnail: "https://images.unsplash.com/photo-1512820790803-83ca734da794?auto=format&fit=crop&w=400&q=80", publishedDate: "1980-08-25", infoLink: "#" },
            { id: "id3", title: "Filosofi Keras & Teras", authors: "Henry Manampiring", category: "Self Improvement", description: "Panduan praktis berdamai dengan emosi negatif, mengasah ketangguhan mental menggunakan landasan stoisisme kuno yang disesuaikan kondisi Indonesia.", thumbnail: "https://images.unsplash.com/photo-1506880018603-83d5b814b5a6?auto=format&fit=crop&w=400&q=80", publishedDate: "2018-11-26", infoLink: "#" },
            { id: "id4", title: "Laut Bercerita", authors: "Leila S. Chudori", category: "Novel Indonesia", description: "Sebuah catatan kelam tentang kehilangan, penyuaraan hak kemanusiaan, serta perjuangan keluarga para aktivis mahasiswa yang diculik tahun 1998.", thumbnail: "https://images.unsplash.com/photo-1516979187457-637abb4f9353?auto=format&fit=crop&w=400&q=80", publishedDate: "2017-10-12", infoLink: "#" },
            { id: "id5", title: "Perahu Kertas", authors: "Dee Lestari", category: "Romance Indonesia", description: "Perjalanan pencarian jati diri, jalinan cinta, cita-cita, serta persahabatan antara Kugy yang imajinatif dan Keenan yang artistik.", thumbnail: "https://images.unsplash.com/photo-1532012197267-da84d127e765?auto=format&fit=crop&w=400&q=80", publishedDate: "2009-08-01", infoLink: "#" },
            { id: "id6", title: "Pulang", authors: "Leila S. Chudori", category: "Sastra Sejarah", description: "Kisah drama keluarga eksil politik Indonesia di Paris pasca kejadian 1965 yang merindukan tanah kelahiran namun terasing dari negaranya.", thumbnail: "https://images.unsplash.com/photo-1497633762265-9d179a990aa6?auto=format&fit=crop&w=400&q=80", publishedDate: "2012-12-12", infoLink: "#" },
            { id: "id7", title: "Gadis Kretek", authors: "Ratih Kumala", category: "Novel Indonesia", description: "Penjelajahan sejarah industri kretek di Indonesia, mengungkap jalinan cinta segitiga mendalam serta misteri keluarga pemilik pabrik.", thumbnail: "https://images.unsplash.com/photo-1495640388908-05fa85288e61?auto=format&fit=crop&w=400&q=80", publishedDate: "2012-03-01", infoLink: "#" },
            { id: "id8", title: "Negeri 5 Menara", authors: "Ahmad Fuadi", category: "Inspiratif", description: "Kisah persahabatan enam santri dari berbagai daerah di pondok Madani, berkomitmen meraih mimpi global lewat mantra Man Jadda Wajada.", thumbnail: "https://images.unsplash.com/photo-1524995997946-a1c2e315a42f?auto=format&fit=crop&w=400&q=80", publishedDate: "2009-07-01", infoLink: "#" },
            { id: "id9", title: "Cantik Itu Luka", authors: "Eka Kurniawan", category: "Realisme Magis", description: "Karya sastra luar biasa berlatar masa kolonial hingga pasca kemerdekaan, menceritakan garis keturunan Dewi Ayu penuh kutukan magis.", thumbnail: "https://images.unsplash.com/photo-1456513080510-7bf3a84b82f8?auto=format&fit=crop&w=400&q=80", publishedDate: "2002-03-15", infoLink: "#" },
            { id: "id10", title: "Ronggeng Dukuh Paruk", authors: "Ahmad Tohari", category: "Sastra Budaya", description: "Kisah cinta tragis antara Srintil seorang penari ronggeng legendaris dengan Rasus, berlatar pergolakan sosio-politik pedesaan Jawa.", thumbnail: "https://images.unsplash.com/photo-1506466010722-395cc2ea8775?auto=format&fit=crop&w=400&q=80", publishedDate: "1982-02-01", infoLink: "#" },
            { id: "id11", title: "Sang Pemimpi", authors: "Andrea Hirata", category: "Novel Indonesia", description: "Buku kedua tetralogi laskar pelangi, mengisahkan kenakalan remaja SMA yang gigih mengejar impian beasiswa pendidikan ke Eropa.", thumbnail: "https://images.unsplash.com/photo-1512820790803-83ca734da794?auto=format&fit=crop&w=400&q=80", publishedDate: "2006-07-01", infoLink: "#" },
            { id: "id12", title: "Supernova: Ksatria, Puteri", authors: "Dee Lestari", category: "Fiksi Sains", description: "Eksplorasi fiksi ilmiah bercampur jalinan asmara romantis yang menggabungkan sains modern, filsafat, serta spiritualitas universal.", thumbnail: "https://images.unsplash.com/photo-1476275466078-4007374efbbe?auto=format&fit=crop&w=400&q=80", publishedDate: "2001-03-01", infoLink: "#" },
            { id: "id13", title: "Aroma Karsa", authors: "Dee Lestari", category: "Misteri Fantasi", description: "Petualangan melacak keberadaan tanaman mitologi tanaman sakti berbekal indra penciuman luar biasa di dasar hutan belantara.", thumbnail: "https://images.unsplash.com/photo-1589829085413-56de8ae18c73?auto=format&fit=crop&w=400&q=80", publishedDate: "2018-03-16", infoLink: "#" },
            { id: "id14", title: "Dilan: Dia adalah Dilanku", authors: "Pidi Baiq", category: "Romance Indonesia", description: "Romantika manis remaja SMA Bandung tahun 1990 antara Milea dengan Dilan, anggota geng motor yang gemar merayu dengan cara unik.", thumbnail: "https://images.unsplash.com/photo-1491841573178-8af01f1e45ef?auto=format&fit=crop&w=400&q=80", publishedDate: "2014-03-01", infoLink: "#" },
            { id: "id15", title: "Sabtu Bersama Bapak", authors: "Adhitya Mulya", category: "Drama Keluarga", description: "Pesan-pesan kehidupan berharga dari seorang bapak yang direkam sebelum wafat untuk mendampingi tumbuh kembang anak lelakinya.", thumbnail: "https://images.unsplash.com/photo-1474932430478-367db26836c1?auto=format&fit=crop&w=400&q=80", publishedDate: "2014-06-01", infoLink: "#" },
            { id: "id16", title: "Critical Eleven", authors: "Ika Natassa", category: "Romance Indonesia", description: "Mengupas dinamika hubungan pernikahan modern, menitikberatkan fase kritis 11 menit pertama dan terakhir saat berinteraksi.", thumbnail: "https://images.unsplash.com/photo-1518373386927-85ae07d17606?auto=format&fit=crop&w=400&q=80", publishedDate: "2015-08-01", infoLink: "#" },
            { id: "id17", title: "Saman", authors: "Ayu Utami", category: "Sastra Kontemporer", description: "Novel pemenang penghargaan yang mendobrak tabu sastra, mengisahkan gerakan aktivisme, spiritualitas, serta kebebasan berekspresi.", thumbnail: "https://images.unsplash.com/photo-1481627834876-b7833e8f5570?auto=format&fit=crop&w=400&q=80", publishedDate: "1998-04-01", infoLink: "#" },
            { id: "id18", title: "Hujan", authors: "Tere Liye", category: "Fiksi Ilmiah", description: "Kisah persahabatan dan cinta berlatar dunia masa depan distopia pasca bencana alam besar, membahas pengorbanan dan kenangan.", thumbnail: "https://images.unsplash.com/photo-1519681393784-d120267933ba?auto=format&fit=crop&w=400&q=80", publishedDate: "2016-01-01", infoLink: "#" },
            { id: "id19", title: "Bumi", authors: "Tere Liye", category: "Fantasi Petualangan", description: "Awal perjalanan petualangan dunia paralel tiga remaja berkekuatan unik menjelajahi klan-klan tersembunyi yang canggih.", thumbnail: "https://images.unsplash.com/photo-1508921912186-1d1a45ebb3c1?auto=format&fit=crop&w=400&q=80", publishedDate: "2014-01-15", infoLink: "#" },
            { id: "id20", title: "Dikta & Hukum", authors: "Dhia'an Farah", category: "Romance Indonesia", description: "Kisah haru penuh emosi persahabatan sejak kecil yang berubah menjadi ikatan perjodohan di tengah perjuangan melawan takdir medis.", thumbnail: "https://images.unsplash.com/photo-1463320360370-4be29475328b?auto=format&fit=crop&w=400&q=80", publishedDate: "2021-05-10", infoLink: "#" }
        ];

        function switchPage(page) {
            currentPage = page;
            
            ['beranda', 'rekomendasi', 'pencarian', 'favorit'].forEach(p => {
                const btn = document.getElementById(`nav-${p}`);
                if (p === page) {
                    btn.className = "px-4 py-2 rounded-lg font-semibold bg-indigo-800 text-white transition";
                } else {
                    btn.className = "px-4 py-2 rounded-lg font-semibold hover:bg-indigo-700 text-white transition";
                }
            });

            searchSection.classList.add('hidden');

            if (page === 'beranda') {
                currentLoadedBooks = [...dataBukuIndonesia];
                shuffleArray(currentLoadedBooks); // Otomatis acak susunan buku saat di-refresh / klik Beranda
                displayBooks(currentLoadedBooks);
            } else if (page === 'rekomendasi') {
                currentLoadedBooks = dataBukuIndonesia.filter((_, index) => index % 2 === 0);
                displayBooks(currentLoadedBooks);
            } else if (page === 'pencarian') {
                searchSection.classList.remove('hidden');
                bookContainer.innerHTML = `<div class="col-span-full text-center text-gray-500 py-10">Ketik nama buku Indonesia di atas (Contoh: Laskar Pelangi, Tere Liye, Bumi Manusia)</div>`;
            } else if (page === 'favorit') {
                currentLoadedBooks = favoriteBooks;
                displayBooks(favoriteBooks);
            }
            updateFavBadge();
        }

        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
        }

        function displayBooks(books) {
            bookContainer.innerHTML = '';
            loadingElement.classList.add('hidden');
            bookContainer.classList.remove('hidden');

            if (books.length === 0) {
                bookContainer.innerHTML = `<div class="col-span-full text-center text-gray-500 py-10">Tidak ada koleksi buku yang sesuai.</div>`;
                return;
            }

            books.forEach(book => {
                const year = book.publishedDate.substring(0, 4);
                const card = document.createElement('div');
                card.className = "bg-white rounded-xl shadow-md overflow-hidden hover:shadow-2xl transition duration-300 flex flex-col border border-gray-100 cursor-pointer transform hover:-translate-y-1";
                card.setAttribute('onclick', `openModal('${book.id}')`);

                card.innerHTML = `
                    <div class="h-64 bg-gray-100 flex items-center justify-center relative overflow-hidden">
                        <img src="${book.thumbnail}" alt="${book.title}" class="w-full h-full object-cover transition-transform duration-300 hover:scale-105">
                    </div>
                    <div class="p-5 flex flex-col flex-grow">
                        <span class="text-xs font-semibold text-indigo-600 uppercase tracking-wider mb-1">${book.category}</span>
                        <h3 class="text-base font-bold text-gray-900 line-clamp-2 mb-1" title="${book.title}">${book.title}</h3>
                        <p class="text-xs text-gray-500 mb-2">Oleh: <span class="font-medium text-gray-700">${book.authors}</span></p>
                        <p class="text-xs text-gray-400 mt-auto">Tahun Terbit: <span class="font-medium">${year}</span></p>
                    </div>
                `;
                bookContainer.appendChild(card);
            });
        }

        function openModal(id) {
            const book = dataBukuIndonesia.find(b => b.id === id) || favoriteBooks.find(b => b.id === id);
            if (!book) return;

            const year = book.publishedDate.substring(0, 4);
            const isSaved = favoriteBooks.some(b => b.id === book.id);

            modalCategory.innerText = book.category;
            modalImg.src = book.thumbnail;
            modalTitle.innerText = book.title;
            modalAuthors.innerText = book.authors;
            modalYear.innerText = year;
            modalDesc.innerText = book.description;
            modalLink.href = book.infoLink;

            if (isSaved) {
                modalFavBtn.className = "flex-1 py-2.5 rounded-xl font-semibold text-sm transition bg-red-50 hover:bg-red-100 text-red-600";
                modalFavBtn.innerHTML = "❤️ Hapus dari Favorit";
            } else {
                modalFavBtn.className = "flex-1 py-2.5 rounded-xl font-semibold text-sm transition bg-indigo-600 hover:bg-indigo-700 text-white";
                modalFavBtn.innerHTML = "💾 Simpan ke Favorit";
            }

            modalFavBtn.onclick = function(e) {
                e.stopPropagation();
                toggleFavorite(book);
            };

            bookModal.classList.remove('hidden');
            setTimeout(() => {
                bookModal.classList.remove('opacity-0');
                bookModal.querySelector('.pref-modal').classList.remove('scale-95');
            }, 10);
        }

        function closeModal() {
            bookModal.classList.add('opacity-0');
            bookModal.querySelector('.pref-modal').classList.add('scale-95');
            setTimeout(() => {
                bookModal.classList.add('hidden');
            }, 300);
        }

        window.onclick = function(event) {
            if (event.target === bookModal) {
                closeModal();
            }
        }

        function toggleFavorite(book) {
            const index = favoriteBooks.findIndex(b => b.id === book.id);
            
            if (index > -1) {
                favoriteBooks.splice(index, 1);
            } else {
                favoriteBooks.push(book);
            }
            
            localStorage.setItem('favBooks', JSON.stringify(favoriteBooks));
            updateFavBadge();

            openModal(book.id);

            if (currentPage === 'favorit') {
                currentLoadedBooks = favoriteBooks;
                displayBooks(favoriteBooks);
                if(favoriteBooks.length === 0) closeModal();
            }
        }

        function updateFavBadge() {
            if (favoriteBooks.length > 0) {
                favCountBadge.innerText = favoriteBooks.length;
                favCountBadge.classList.remove('hidden');
            } else {
                favCountBadge.classList.add('hidden');
            }
        }

        function searchLocalBooks() {
            const query = searchInput.value.trim().toLowerCase();
            if (!query) {
                bookContainer.innerHTML = `<div class="col-span-full text-center text-gray-500 py-10">Silakan isi kata kunci pencarian buku terlebih dahulu.</div>`;
                return;
            }
            
            currentLoadedBooks = dataBukuIndonesia.filter(book => 
                book.title.toLowerCase().includes(query) || 
                book.authors.toLowerCase().includes(query) ||
                book.category.toLowerCase().includes(query)
            );
            
            displayBooks(currentLoadedBooks);
        }

        searchBtn.addEventListener('click', searchLocalBooks);
        searchInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') searchLocalBooks();
        });

        switchPage('beranda');
    </script>
</body>
</html>
