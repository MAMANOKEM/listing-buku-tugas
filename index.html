<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BookVerse - Platform Buku Digital</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 font-sans min-h-screen flex flex-col">

    <header class="bg-indigo-600 text-white shadow-md sticky top-0 z-50">
        <div class="container mx-auto px-4 py-4 flex flex-col md:flex-row justify-between items-center gap-4">
            <h1 class="text-2xl font-bold tracking-wide flex items-center gap-2 cursor-pointer" onclick="switchPage('beranda')">
                📚 BookVerse
            </h1>
            
            <nav class="flex flex-wrap justify-center gap-2">
                <button id="nav-beranda" onclick="switchPage('beranda')" class="px-4 py-2 rounded-lg font-semibold bg-indigo-800 text-white transition">
                    Beranda
                </button>
                <button id="nav-rekomendasi" onclick="switchPage('rekomendasi')" class="px-4 py-2 rounded-lg font-semibold hover:bg-indigo-700 transition">
                    Rekomendasi
                </button>
                <button id="nav-pencarian" onclick="switchPage('pencarian')" class="px-4 py-2 rounded-lg font-semibold hover:bg-indigo-700 transition">
                    Buku Pencarian
                </button>
                <button id="nav-favorit" onclick="switchPage('favorit')" class="px-4 py-2 rounded-lg font-semibold hover:bg-indigo-700 transition flex items-center gap-1">
                    Favorit <span id="fav-count" class="bg-red-500 text-white text-xs px-2 py-0.5 rounded-full hidden">0</span>
                </button>
            </nav>
        </div>
    </header>

    <main class="container mx-auto px-4 py-8 flex-grow max-w-6xl">

        <div id="searchSection" class="max-w-xl mx-auto mb-8 flex gap-2 hidden">
            <input type="text" id="searchInput" placeholder="Ketik judul buku atau penulis..." 
                   class="w-full px-4 py-2 border-2 border-indigo-200 rounded-lg text-gray-800 focus:outline-none focus:ring-2 focus:ring-indigo-400">
            <button id="searchBtn" class="bg-indigo-600 hover:bg-indigo-700 text-white px-6 py-2 rounded-lg font-semibold transition">
                Cari
            </button>
        </div>

        <div id="loading" class="text-center text-xl font-semibold text-indigo-600 my-10 hidden">
            Sedang memuat data buku...
        </div>

        <div id="bookContainer" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-8 justify-center">
        </div>
    </main>

    <div id="bookModal" class="fixed inset-0 bg-black bg-opacity-50 z-50 flex items-center justify-center p-4 hidden opacity-0 transition-opacity duration-300">
        <div class="bg-white rounded-2xl max-w-2xl w-full max-h-[90vh] overflow-y-auto shadow-2xl transform scale-95 transition-transform duration-300 pref-modal">
            <div class="p-4 border-b flex justify-between items-center sticky top-0 bg-white z-10">
                <span id="modalCategory" class="text-xs font-bold text-indigo-600 uppercase tracking-wider">Kategori</span>
                <button onclick="closeModal()" class="text-gray-400 hover:text-gray-600 text-2xl font-bold px-2">&times;</button>
            </div>
            <div class="p-6 flex flex-col md:flex-row gap-6">
                <div class="w-full md:w-1/3 flex justify-center">
                    <img id="modalImg" src="" alt="Cover Buku" class="h-60 object-contain shadow-lg rounded-lg">
                </div>
                <div class="w-full md:w-2/3 flex flex-col">
                    <h3 id="modalTitle" class="text-2xl font-bold text-gray-900 mb-1">Judul Buku</h3>
                    <p class="text-sm text-gray-600 mb-1">Penulis: <span id="modalAuthors" class="font-semibold text-gray-800">Nama</span></p>
                    <p class="text-sm text-gray-600 mb-4">Tahun Terbit: <span id="modalYear" class="font-semibold text-gray-800">Tahun</span></p>
                    <h4 class="font-bold text-gray-800 text-sm mb-1">Sinopsis / Deskripsi:</h4>
                    <p id="modalDesc" class="text-sm text-gray-600 text-justify leading-relaxed flex-grow overflow-y-auto max-h-40 pr-2">Deskripsi Lengkap...</p>
                    
                    <div class="mt-6 flex gap-3">
                        <button id="modalFavBtn" class="flex-1 py-2.5 rounded-xl font-semibold text-sm transition flex items-center justify-center gap-2">
                        </button>
                        <a id="modalLink" href="#" target="_blank" class="block text-center bg-gray-100 text-gray-700 font-medium py-2.5 px-4 rounded-xl transition text-sm">
                            Baca Detail Lengkap ↗
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <footer class="bg-gray-800 text-gray-400 text-center py-4 text-sm mt-auto">
        &copy; 2026 Maman
    </footer>

    <script>
        const bookContainer = document.getElementById('bookContainer');
        const loadingElement = document.getElementById('loading');
        const searchSection = document.getElementById('searchSection');
        const searchInput = document.getElementById('searchInput');
        const searchBtn = document.getElementById('searchBtn');
        const favCountBadge = document.getElementById('fav-count');

        const bookModal = document.getElementById('bookModal');
        const modalCategory = document.getElementById('modalCategory');
        const modalImg = document.getElementById('modalImg');
        const modalTitle = document.getElementById('modalTitle');
        const modalAuthors = document.getElementById('modalAuthors');
        const modalYear = document.getElementById('modalYear');
        const modalDesc = document.getElementById('modalDesc');
        const modalFavBtn = document.getElementById('modalFavBtn');
        const modalLink = document.getElementById('modalLink');

        let currentPage = 'beranda';
        let favoriteBooks = JSON.parse(localStorage.getItem('favBooks')) || [];
        let currentLoadedBooks = [];

        const dataBeranda = [
            { id: "b1", title: "Eloquent JavaScript", authors: "Marijn Haverbeke", category: "Programming", description: "Buku panduan mendalam tentang pemrograman JavaScript murni beserta manipulasi DOM di web browser.", thumbnail: "https://images-na.ssl-images-amazon.com/images/I/51MS1nHX6mL._SX373_BO1,204,203,200_.jpg", publishedDate: "2018-12-04", infoLink: "https://eloquentjavascript.net/" },
            { id: "b2", title: "JavaScript: The Good Parts", authors: "Douglas Crockford", category: "Programming", description: "Mengupas fitur-fitur terbaik dari bahasa pemrograman JavaScript yang wajib dipahami oleh setiap web developer profesional.", thumbnail: "https://images-na.ssl-images-amazon.com/images/I/5131OWtQv7L._SX379_BO1,204,203,200_.jpg", publishedDate: "2008-05-01", infoLink: "#" },
            { id: "b3", title: "You Don't Know JS Yet", authors: "Kyle Simpson", category: "Programming", description: "Buku seri legendaris yang membahas cara kerja mesin asynchronous, scope, closure, dan objek internal JavaScript secara menyeluruh.", thumbnail: "https://images-na.ssl-images-amazon.com/images/I/41T5H8u7fUL._SX331_BO1,204,203,200_.jpg", publishedDate: "2020-01-25", infoLink: "#" },
            { id: "b4", title: "Clean Code", authors: "Robert C. Martin", description: "Panduan menulis kode yang rapi, efisien, mudah dibaca, dan mudah dirawat dalam pengembangan software berskala besar.", category: "Programming", thumbnail: "https://images-na.ssl-images-amazon.com/images/I/41xShbXbyZL._SX376_BO1,204,203,200_.jpg", publishedDate: "2008-08-01", infoLink: "#" },
            { id: "b5", title: "Design Patterns", authors: "Erich Gamma", description: "Solusi-solusi standar arsitektur pemrograman berorientasi objek (OOP) untuk mengatasi masalah software yang sering muncul.", category: "Programming", thumbnail: "https://images-na.ssl-images-amazon.com/images/I/51szb57QvXL._SX396_BO1,204,203,200_.jpg", publishedDate: "1994-10-31", infoLink: "#" },
            { id: "b6", title: "Introduction to Algorithms", authors: "Thomas H. Cormen", description: "Buku panduan komprehensif mengenai struktur data dan algoritma komputer yang menjadi fondasi dasar rekayasa perangkat lunak.", category: "Programming", thumbnail: "https://images-na.ssl-images-amazon.com/images/I/41vOepSpAsL._SX373_BO1,204,203,200_.jpg", publishedDate: "2009-07-31", infoLink: "#" }
        ];

        const dataRekomendasi = [
            { id: "r1", title: "Atomic Habits", authors: "James Clear", category: "Self Improvement", description: "Cara mudah dan terbukti untuk membangun kebiasaan baik dan menghilangkan kebiasaan buruk demi perubahan hidup yang drastis.", thumbnail: "https://images-na.ssl-images-amazon.com/images/I/51-nXsSRfZL._SX329_BO1,204,203,200_.jpg", publishedDate: "2018-10-16", infoLink: "#" },
            { id: "r2", title: "Filosofi Teras", authors: "Henry Manampiring", category: "Self Improvement", description: "Penerapan filsafat Yunani-Romawi kuno (Stoisisme) untuk menenangkan pikiran dan mental dalam menghadapi tantangan hidup modern.", thumbnail: "https://images-na.ssl-images-amazon.com/images/I/41D-vWf9XLL._SX331_BO1,204,203,200_.jpg", publishedDate: "2018-11-26", infoLink: "#" },
            { id: "r3", title: "Deep Work", authors: "Cal Newport", category: "Self Improvement", description: "Aturan dan panduan untuk tetap fokus secara mendalam di tengah dunia yang penuh dengan distraksi teknologi digital digital.", thumbnail: "https://images-na.ssl-images-amazon.com/images/I/417yHQb9crL._SX331_BO1,204,203,200_.jpg", publishedDate: "2016-01-05", infoLink: "#" },
            { id: "r4", title: "Start With Why", authors: "Simon Sinek", category: "Self Improvement", description: "Bagaimana para pemimpin besar menginspirasi semua orang untuk mengambil tindakan berdasarkan tujuan utama (Why).", thumbnail: "https://images-na.ssl-images-amazon.com/images/I/516L-9NAsfL._SX324_BO1,204,203,200_.jpg", publishedDate: "2009-10-29", infoLink: "#" },
            { id: "r5", title: "Mindset", authors: "Carol S. Dweck", category: "Self Improvement", description: "Mengungkap kekuatan pola pikir (growth mindset) dalam menentukan kesuksesan belajar, berbisnis, dan relasi kehidupan.", thumbnail: "https://images-na.ssl-images-amazon.com/images/I/51j5GfR7YBL._SX324_BO1,204,203,200_.jpg", publishedDate: "2006-02-28", infoLink: "#" },
            { id: "r6", title: "Grit", authors: "Angela Duckworth", category: "Self Improvement", description: "Mengapa rahasia pencapaian luar biasa bukanlah bakat, melainkan perpaduan antara hasrat (passion) dan kegigihan (perseverance).", thumbnail: "https://images-na.ssl-images-amazon.com/images/I/41K99-Qf7LL._SX324_BO1,204,203,200_.jpg", publishedDate: "2016-05-03", infoLink: "#" }
        ];

        function switchPage(page) {
            currentPage = page;
            
            ['beranda', 'rekomendasi', 'pencarian', 'favorit'].forEach(p => {
                const btn = document.getElementById(`nav-${p}`);
                if (p === page) {
                    btn.className = "px-4 py-2 rounded-lg font-semibold bg-indigo-800 text-white transition";
                } else {
                    btn.className = "px-4 py-2 rounded-lg font-semibold hover:bg-indigo-700 text-white transition";
                }
            });

            searchSection.classList.add('hidden');

            if (page === 'beranda') {
                currentLoadedBooks = dataBeranda;
                displayBooks(currentLoadedBooks);
            } else if (page === 'rekomendasi') {
                currentLoadedBooks = dataRekomendasi;
                displayBooks(currentLoadedBooks);
            } else if (page === 'pencarian') {
                searchSection.classList.remove('hidden');
                bookContainer.innerHTML = ``;
            } else if (page === 'favorit') {
                currentLoadedBooks = favoriteBooks;
                displayBooks(favoriteBooks);
            }
            updateFavBadge();
        }

        function displayBooks(books) {
            bookContainer.innerHTML = '';
            loadingElement.classList.add('hidden');
            bookContainer.classList.remove('hidden');

            if (books.length === 0) {
                return;
            }

            books.forEach(book => {
                const year = book.publishedDate.substring(0, 4);
                const card = document.createElement('div');
                card.className = "bg-white rounded-xl shadow-md overflow-hidden hover:shadow-2xl transition duration-300 flex flex-col border border-gray-100 cursor-pointer transform hover:-translate-y-1";
                card.setAttribute('onclick', `openModal('${book.id}')`);

                card.innerHTML = `
                    <div class="h-64 bg-gray-100 flex items-center justify-center p-6">
                        <img src="${book.thumbnail}" alt="${book.title}" class="h-full object-contain shadow-lg rounded">
                    </div>
                    <div class="p-5 flex flex-col flex-grow">
                        <span class="text-xs font-semibold text-indigo-600 uppercase tracking-wider mb-1">${book.category}</span>
                        <h3 class="text-base font-bold text-gray-900 line-clamp-2 mb-1" title="${book.title}">${book.title}</h3>
                        <p class="text-xs text-gray-500 mb-2">Oleh: <span class="font-medium text-gray-700">${book.authors}</span></p>
                        <p class="text-xs text-gray-400 mt-auto">Tahun Terbit: <span class="font-medium">${year}</span></p>
                    </div>
                `;
                bookContainer.appendChild(card);
            });
        }

        function openModal(id) {
            const book = currentLoadedBooks.find(b => b.id === id) || favoriteBooks.find(b => b.id === id);
            if (!book) return;

            const year = book.publishedDate.substring(0, 4);
            const isSaved = favoriteBooks.some(b => b.id === book.id);

            modalCategory.innerText = book.category;
            modalImg.src = book.thumbnail;
            modalTitle.innerText = book.title;
            modalAuthors.innerText = book.authors;
            modalYear.innerText = year;
            modalDesc.innerText = book.description;
            modalLink.href = book.infoLink;

            if (isSaved) {
                modalFavBtn.className = "flex-1 py-2.5 rounded-xl font-semibold text-sm transition bg-red-50 hover:bg-red-100 text-red-600";
                modalFavBtn.innerHTML = "❤️ Hapus dari Favorit";
            } else {
                modalFavBtn.className = "flex-1 py-2.5 rounded-xl font-semibold text-sm transition bg-indigo-600 hover:bg-indigo-700 text-white";
                modalFavBtn.innerHTML = "💾 Simpan ke Favorit";
            }

            modalFavBtn.onclick = function(e) {
                e.stopPropagation();
                toggleFavorite(book);
            };

            bookModal.classList.remove('hidden');
            setTimeout(() => {
                bookModal.classList.remove('opacity-0');
                bookModal.querySelector('.pref-modal').classList.remove('scale-95');
            }, 10);
        }

        function closeModal() {
            bookModal.classList.add('opacity-0');
            bookModal.querySelector('.pref-modal').classList.add('scale-95');
            setTimeout(() => {
                bookModal.classList.add('hidden');
            }, 300);
        }

        window.onclick = function(event) {
            if (event.target === bookModal) {
                closeModal();
            }
        }

        function toggleFavorite(book) {
            const index = favoriteBooks.findIndex(b => b.id === book.id);
            
            if (index > -1) {
                favoriteBooks.splice(index, 1);
            } else {
                favoriteBooks.push(book);
            }
            
            localStorage.setItem('favBooks', JSON.stringify(favoriteBooks));
            updateFavBadge();

            openModal(book.id);

            if (currentPage === 'favorit') {
                currentLoadedBooks = favoriteBooks;
                displayBooks(favoriteBooks);
                if(favoriteBooks.length === 0) closeModal();
            }
        }

        function updateFavBadge() {
            if (favoriteBooks.length > 0) {
                favCountBadge.innerText = favoriteBooks.length;
                favCountBadge.classList.remove('hidden');
            } else {
                favCountBadge.classList.add('hidden');
            }
        }

        function searchLocalBooks(query) {
            const lowerQuery = query.toLowerCase();
            const allBooks = [...dataBeranda, ...dataRekomendasi, ...favoriteBooks];
            
            const uniqueBooks = Array.from(new Map(allBooks.map(item => [item.id, item])).values());
            
            currentLoadedBooks = uniqueBooks.filter(book => 
                book.title.toLowerCase().includes(lowerQuery) || 
                book.authors.toLowerCase().includes(lowerQuery)
            );
            
            displayBooks(currentLoadedBooks);
            if(currentLoadedBooks.length === 0) {
                bookContainer.innerHTML = `<div class="col-span-full text-center text-gray-500 py-10">Buku tidak ditemukan di dalam sistem data.</div>`;
            }
        }

        searchBtn.addEventListener('click', () => {
            const query = searchInput.value.trim();
            if (query) searchLocalBooks(query);
        });

        searchInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                const query = searchInput.value.trim();
                if (query) searchLocalBooks(query);
            }
        });

        switchPage('beranda');
    </script>
</body>
</html>
